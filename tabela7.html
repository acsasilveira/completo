<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela7</title>
    <link rel="stylesheet" href="./css/tabela.css">
</head>
<body>
    <table>
        <tr>
          <td>1</td>
          <td>2</td>
          <td>3</td>
          <td>4</td>
          <td>5</td>
        </tr>
        <tr>
          <td rowspan="3">6</td>
          <td>7</td>
          <td colspan="2">8</td>
          <td>9</td>
        </tr>
        <tr>
          <td colspan="2">10</td>
          <td>11</td>
          <td rowspan="3">12</td>
        </tr>
        <tr>
          <td>13</td>
          <td>14</td>
          <td>15</td>
        </tr>
        <tr>
          <td>16</td>
          <td colspan="3">17</td>
        </tr>
      </table>
</body>
</html>
